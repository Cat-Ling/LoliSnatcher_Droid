name: Manual Build

on:
  workflow_dispatch:

jobs:
  android-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Get version info
        id: version_info
        run: |
          python -c "
          import re
          with open('pubspec.yaml', 'r') as f:
              content = f.read()
          m = re.search(r'version:\s*(\d+\.\d+\.\d+)\+(\d+)', content)
          print('version_name=' + m.group(1), flush=True)
          print('build_number=' + m.group(2), flush=True)
          " >> $GITHUB_OUTPUT

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'beta'
          cache: true

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Install dependencies
        run: flutter pub get

      - name: Decode signing key
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          echo "$SIGNING_KEY_BASE64" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > android/key.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Build APK for testing
        run: bash build.sh test

      - name: Upload APK (arm64-v8a)
        uses: actions/upload-artifact@v7
        with:
          path: build/app/outputs/flutter-apk/LoliSnatcher_*_arm64-v8a_*.apk
          archive: false

      - name: Upload APK (armeabi-v7a)
        uses: actions/upload-artifact@v7
        with:
          path: build/app/outputs/flutter-apk/LoliSnatcher_*_armeabi-v7a_*.apk
          archive: false

      - name: Upload APK (x86_64)
        uses: actions/upload-artifact@v7
        with:
          path: build/app/outputs/flutter-apk/LoliSnatcher_*_x86_64_*.apk
          archive: false

  ios-build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Get version info
        id: version_info
        run: |
          python -c "
          import re
          with open('pubspec.yaml', 'r') as f:
              content = f.read()
          m = re.search(r'version:\s*(\d+\.\d+\.\d+)\+(\d+)', content)
          print('version_name=' + m.group(1), flush=True)
          print('build_number=' + m.group(2), flush=True)
          " >> $GITHUB_OUTPUT

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'beta'
          cache: true

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Install dependencies
        run: flutter pub get

      - name: Patch device_info_plus for iOS build
        run: |
          # The isiOSAppOnVision property causes build errors on some environments.
          # We patch it to return NO as it is not needed for this app.
          find /Users/runner/.pub-cache -name "FPPDeviceInfoPlusPlugin.m" -exec sed -i '' 's/\[NSProcessInfo processInfo\].isiOSAppOnVision/NO/g' {} +
          find /Users/runner/.pub-cache -name "FPPDeviceInfoPlusPlugin.m" -exec sed -i '' 's/\[info isiOSAppOnVision\]/NO/g' {} +

      - name: Build iOS (Unsigned)
        run: |
          # Remove Development Team and Provisioning Profiles from the project file
          sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;//g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = [^;]*;//g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' ios/Runner.xcodeproj/project.pbxproj          
          # Force the build
          flutter build ios --release --no-codesign
        env:
          GCC_WARN_INHIBIT_ALL_WARNINGS: "YES"
          CODE_SIGNING_ALLOWED: "NO"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGN_IDENTITY: ""
          CODE_SIGN_ENTITLEMENTS: ""

      - name: Prepare iOS artifact (Unsigned IPA)
        run: |
          VERSION_NAME=${{ steps.version_info.outputs.version_name }}
          BUILD_NUMBER=${{ steps.version_info.outputs.build_number }}
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          rm -rf Payload/Runner.app/_CodeSignature
          rm -f Payload/Runner.app/embedded.mobileprovision
          zip -r "LoliSnatcher_${VERSION_NAME}_${BUILD_NUMBER}_ios_unsigned.ipa" Payload/

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v7
        with:
          path: "*.ipa"
          archive: false
