name: Manual iOS Build

on:
  workflow_dispatch:
    inputs:
      custom_message:
        description: 'Custom message for Discord notification'
        required: false
        default: 'Manual iOS build triggered'
        type: string

jobs:
  ios-build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Get version info
        id: version_info
        run: |
          python -c "
          import re
          with open('pubspec.yaml', 'r') as f:
              content = f.read()
          m = re.search(r'version:\s*(\d+\.\d+\.\d+)\+(\d+)', content)
          print('version_name=' + m.group(1), flush=True)
          print('build_number=' + m.group(2), flush=True)
          " >> $GITHUB_OUTPUT

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'beta'
          cache: true

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Install dependencies
        run: flutter pub get

      - name: Patch device_info_plus for iOS build
        run: |
          # The isiOSAppOnVision property causes build errors on some environments.
          # We patch it to return NO as it is not needed for this app.
          find /Users/runner/.pub-cache -name "FPPDeviceInfoPlusPlugin.m" -exec sed -i '' 's/\[NSProcessInfo processInfo\].isiOSAppOnVision/NO/g' {} +
          find /Users/runner/.pub-cache -name "FPPDeviceInfoPlusPlugin.m" -exec sed -i '' 's/\[info isiOSAppOnVision\]/NO/g' {} +

      - name: Build iOS (Unsigned)
        run: flutter build ios --release --no-codesign
        env:
          FLUTTER_XCODE_GCC_WARN_INHIBIT_ALL_WARNINGS: "YES"

      - name: Prepare iOS artifact (Unsigned IPA)
        run: |
          VERSION_NAME=${{ steps.version_info.outputs.version_name }}
          BUILD_NUMBER=${{ steps.version_info.outputs.build_number }}
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          rm -rf Payload/Runner.app/_CodeSignature
          rm -f Payload/Runner.app/embedded.mobileprovision
          zip -r "LoliSnatcher_${VERSION_NAME}_${BUILD_NUMBER}_ios_unsigned.ipa" Payload/

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v7
        with:
          path: "*.ipa"
          archive: false

      - name: Send Discord notification
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION_NAME: ${{ steps.version_info.outputs.version_name }}
          BUILD_NUMBER: ${{ steps.version_info.outputs.build_number }}
          CUSTOM_MESSAGE: "${{ inputs.custom_message }}"
          BUILD_STATUS: ${{ job.status }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TRIGGERED_BY: ${{ github.actor }}
          COMMIT_SHA: ${{ github.sha }}
        run: python .github/scripts/discord_notify.py
