name: Bump Version and Build

on:
  workflow_dispatch:
    inputs:
      custom_message:
        description: 'Custom message for Discord notification'
        required: false
        default: 'Manual build triggered'
        type: string

jobs:
  bump-version-and-build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Bump build number
        id: bump_version
        run: python .github/scripts/bump_version.py

      - name: Get version info
        id: version_info
        run: |
          echo "version_name=$(cat version_name.txt)" >> $GITHUB_OUTPUT
          echo "build_number=$(cat build_number.txt)" >> $GITHUB_OUTPUT
          rm version_name.txt build_number.txt

      - name: Commit version bump
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add pubspec.yaml lib/src/data/constants.dart
          git commit -m "chore: bump version to ${{ steps.version_info.outputs.version_name }}+${{ steps.version_info.outputs.build_number }}"
          git push

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'beta'
          cache: true

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer

      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Install dependencies
        run: flutter pub get

      # Android Build
      - name: Decode signing key
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          echo "$SIGNING_KEY_BASE64" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > android/key.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Build APK for testing
        run: bash build.sh test

      - name: Upload APK (arm64-v8a)
        uses: actions/upload-artifact@v7
        with:
          path: build/app/outputs/flutter-apk/LoliSnatcher_*_arm64-v8a_*.apk
          archive: false

      - name: Upload APK (armeabi-v7a)
        uses: actions/upload-artifact@v7
        with:
          path: build/app/outputs/flutter-apk/LoliSnatcher_*_armeabi-v7a_*.apk
          archive: false

      - name: Upload APK (x86_64)
        uses: actions/upload-artifact@v7
        with:
          path: build/app/outputs/flutter-apk/LoliSnatcher_*_x86_64_*.apk
          archive: false

      # iOS Build
      - name: Build iOS (Unsigned)
        run: flutter build ios --release --no-codesign

      - name: Prepare iOS artifact (Unsigned IPA)
        run: |
          VERSION_NAME=${{ steps.version_info.outputs.version_name }}
          BUILD_NUMBER=${{ steps.version_info.outputs.build_number }}
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          rm -rf Payload/Runner.app/_CodeSignature
          rm -f Payload/Runner.app/embedded.mobileprovision
          zip -r "LoliSnatcher_${VERSION_NAME}_${BUILD_NUMBER}_ios_unsigned.ipa" Payload/

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v7
        with:
          path: "*.ipa"
          archive: false

      - name: Send Discord notification
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION_NAME: ${{ steps.version_info.outputs.version_name }}
          BUILD_NUMBER: ${{ steps.version_info.outputs.build_number }}
          CUSTOM_MESSAGE: "${{ inputs.custom_message }} (Android + iOS)"
          BUILD_STATUS: ${{ job.status }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TRIGGERED_BY: ${{ github.actor }}
          COMMIT_SHA: ${{ github.sha }}
        run: python .github/scripts/discord_notify.py
